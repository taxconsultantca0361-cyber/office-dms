<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office DMS - Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 { margin-top: 0; color: #333; text-align: center; margin-bottom: 28px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 600; }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,86,179,0.12); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 6px;
            transition: background-color 0.2s;
        }
        .login-btn:hover { background-color: #004494; }
        .login-btn:active { background-color: #003777; }
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🗂️ Office DMS</h2>
        <div class="input-group">
            <label>Username / Email</label>
            <input type="text" id="email" placeholder="Enter your username or email" autocomplete="username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="login-btn" id="login-btn">Secure Log In</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb_VeOkx-sAAoBodr6gSZisAVNC_N5NVs",
            authDomain: "office-dms.firebaseapp.com",
            projectId: "office-dms",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginBtn      = document.getElementById('login-btn');
        const emailInput    = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Allow pressing Enter to submit
        passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
        emailInput.addEventListener('keydown',    (e) => { if (e.key === 'Enter') loginBtn.click(); });

        loginBtn.addEventListener('click', () => {
            const rawEmail = emailInput.value.trim();
            const password = passwordInput.value;

            if (!rawEmail || !password) {
                alert('Please enter your username and password.');
                return;
            }

            // ── Admin direct login (admin / admin) ────────────────────────────
            if (rawEmail === 'admin' && password === 'admin') {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            // ── Firebase auth for regular users ───────────────────────────────
            loginBtn.innerText = 'Logging in…';
            loginBtn.disabled  = true;

            signInWithEmailAndPassword(auth, rawEmail, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // Route admin email to admin dashboard, others to user dashboard
                    if (user.email === 'test@office.com' || user.email === 'admin@admin.com') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                })
                .catch((error) => {
                    loginBtn.innerText = 'Secure Log In';
                    loginBtn.disabled  = false;
                    alert('Login failed: ' + error.message);
                });
        });
    </script>
</body>
</html>
